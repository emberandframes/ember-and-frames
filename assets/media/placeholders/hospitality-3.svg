<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800" role="img" aria-label="Hospitality, a reception desk bell">
  <defs>
    <linearGradient id="h3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1E4D0"/>
      <stop offset="0.55" stop-color="#E4C296"/>
      <stop offset="1" stop-color="#C97B3A"/>
