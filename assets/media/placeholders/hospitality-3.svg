  </defs>
  <rect width="600" height="800" fill="url(#h3bg)"/>
  <circle cx="300" cy="230" r="96" fill="#FBF7F1" fill-opacity="0.20"/>
  <circle cx="300" cy="230" r="60" fill="#FBF7F1" fill-opacity="0.24"/>
  <rect x="34" y="34" width="532" height="732" fill="none" stroke="#3A2A1E" stroke-opacity="0.20" stroke-width="3"/>
  <g fill="none" stroke="#2E241C" stroke-opacity="0.86" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- counter -->
    <line x1="150" y1="540" x2="450" y2="540"/>
    <!-- bell base -->
    <rect x="250" y="516" width="140" height="24" rx="5"/>
    <!-- dome -->
    <path d="M248 516 A72 72 0 0 1 392 516"/>
    <!-- stem + knob -->
